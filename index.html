<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEGO Dimensions – Toy Pad Demo</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div id="loading-text">Loading...</div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-title">LEGO DIMENSIONS</div>

    <button id="open-pad-btn" class="hud-btn">Toy Pad</button>
    <button id="open-settings-btn" class="hud-btn">Settings</button>

    <div id="joycon-status">
      <span id="joycon-icon">🟥</span>
      <span id="joycon-text">Gamepad: geen verbonden</span>
    </div>

    <div id="fps-counter">FPS: 0</div>
  </div>

  <!-- Toy Pad Overlay -->
  <div id="pad-overlay">
    <div id="pad-window">
      <h2>Toy Pad</h2>
      <button id="close-pad-btn" class="hud-btn">Sluiten</button>

      <h3>Figuurtjes</h3>
      <div id="figures"></div>

      <h3>Zones</h3>
      <div id="zones">
        <div class="zone" data-zone="left"><span>Leeg</span></div>
        <div class="zone" data-zone="middle"><span>Leeg</span></div>
        <div class="zone" data-zone="right"><span>Leeg</span></div>
      </div>

      <p id="pad-output">Nog geen figuur geplaatst.</p>
    </div>
  </div>

  <!-- SETTINGS OVERLAY -->
  <div id="settings-overlay">
    <div id="settings-window">
      <h2>Instellingen</h2>
      <button id="close-settings-btn" class="hud-btn">Sluiten</button>

      <h3>Grafisch</h3>
      <label>
        <input type="checkbox" id="toggle-shadows">
        Schaduwen aan/uit
      </label>

      <label>
        Renderkwaliteit:
        <select id="render-scale">
          <option value="1">Hoog</option>
          <option value="0.75">Medium</option>
          <option value="0.5">Laag</option>
        </select>
      </label>

      <h3>Gameplay</h3>
      <label>
        <input type="checkbox" id="toggle-camera-rotate" checked>
        Camera rotatie met pijltjes
      </label>

      <label>
        <input type="checkbox" id="toggle-fps" checked>
        FPS‑counter tonen
      </label>
    </div>
  </div>

  <!-- Debug -->
  <div id="debug-box">Joy-Con debug...</div>

  <!-- Three.js -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <!-- Main Script -->
  <script src="script.js"></script>

</body>
</html>
