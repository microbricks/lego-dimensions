<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Mini 3D LEGO Dimensions + Joy-Con</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: #000;
      color: #eee;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 10px;
      border-radius: 8px;
      z-index: 20;
    }

    #open-pad-btn {
      margin-top: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #888;
      background: #222;
      color: #eee;
      cursor: pointer;
      font-size: 12px;
    }

    #open-pad-btn:hover {
      border-color: #fff;
    }

    #pad-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    #pad-window {
      background: #181818;
      border-radius: 12px;
      border: 1px solid #444;
      padding: 16px;
      width: 420px;
      max-width: 90vw;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
      color: #eee;
    }

    #pad-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    #pad-header h2 {
      margin: 0;
      font-size: 18px;
    }

    #close-pad-btn {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #666;
      background: #222;
      color: #eee;
      cursor: pointer;
      font-size: 11px;
    }

    #close-pad-btn:hover {
      border-color: #fff;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 10px;
    }

    .figure {
      padding: 8px 12px;
      border-radius: 8px;
      border: 2px solid #555;
      background: #222;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      transition: transform 0.1s, box-shadow 0.1s, border-color 0.1s;
    }

    .figure:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      border-color: #fff;
    }

    .figure.active {
      border-color: #0ff;
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.7);
    }

    .pad {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 6px;
    }

    .zone {
      width: 90px;
      height: 90px;
      border-radius: 999px;
      border: 3px solid #555;
      background: radial-gradient(circle at 30% 30%, #333, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .zone:hover {
      transform: translateY(-2px);
      border-color: #888;
    }

    .zone-label {
      position: absolute;
      bottom: 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
    }

    .zone-glow {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      transition: opacity 0.2s;
    }

    .zone.has-figure .zone-glow {
      opacity: 1;
    }

    #pad-output {
      margin-top: 8px;
      font-size: 12px;
      background: #101010;
      border-radius: 8px;
      border: 1px solid #333;
      padding: 8px;
      text-align: center;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div id="hud">
    Mini 3D LEGO Dimensions + Joy-Con<br>
    WASD/pijltjes: bewegen • Spatie: springen<br>
    J: Joy-Cons koppelen (browser moet WebHID ondersteunen)<br>
    <button id="open-pad-btn">Toy Pad openen</button>
  </div>

  <div id="pad-overlay">
    <div id="pad-window">
      <div id="pad-header">
        <h2>Toy Pad</h2>
        <button id="close-pad-btn">Sluiten</button>
      </div>
      <small>Klik eerst een figuur, daarna een zone.</small>

      <div class="row" id="figures"></div>

      <div class="pad">
        <div class="zone" data-zone="left">
          <div class="zone-glow"></div>
          <span>Leeg</span>
          <div class="zone-label">Links</div>
        </div>
        <div class="zone" data-zone="middle">
          <div class="zone-glow"></div>
          <span>Leeg</span>
          <div class="zone-label">Midden</div>
        </div>
        <div class="zone" data-zone="right">
          <div class="zone-glow"></div>
          <span>Leeg</span>
          <div class="zone-label">Rechts</div>
        </div>
      </div>

      <div id="pad-output">Nog geen figuur geplaatst.</div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
