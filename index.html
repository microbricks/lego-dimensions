<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEGO Dimensions – Batman Edition</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #050814;
      font-family: system-ui, sans-serif;
      color: white;
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #hud-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .hud-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: #1a237e;
      color: white;
      cursor: pointer;
      margin-top: 6px;
    }

    #joycon-status {
      margin-top: 8px;
      font-size: 14px;
    }

    /* Toy Pad overlay */
    #pad-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 30;
    }

    #pad-window {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      width: 420px;
      max-width: 90vw;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .figure {
      padding: 8px 12px;
      margin: 4px;
      border-radius: 6px;
      border: 1px solid white;
      background: #222;
      cursor: pointer;
    }

    .figure.active {
      background: #3949ab;
    }

    .zone {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid white;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin: 10px;
      cursor: pointer;
    }

    /* Debug */
    #debug-box {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      max-height: 40vh;
      overflow-y: auto;
      color: #00e5ff;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-title">LEGO DIMENSIONS</div>
    <button id="open-pad-btn" class="hud-btn">Toy Pad</button>

    <div id="joycon-status">
      <span id="joycon-icon">🟥</span>
      <span id="joycon-text">Gamepad: geen verbonden</span>
    </div>
  </div>

  <!-- Toy Pad Overlay -->
  <div id="pad-overlay">
    <div id="pad-window">
      <h2>Toy Pad</h2>
      <button id="close-pad-btn" class="hud-btn">Sluiten</button>

      <h3>Figuurtjes</h3>
      <div id="figures"></div>

      <h3>Zones</h3>
      <div>
        <div class="zone" data-zone="left"><span>Leeg</span></div>
        <div class="zone" data-zone="middle"><span>Leeg</span></div>
        <div class="zone" data-zone="right"><span>Leeg</span></div>
      </div>

      <p id="pad-output">Nog geen figuur geplaatst.</p>
    </div>
  </div>

  <!-- Debug -->
  <div id="debug-box">Joy-Con debug...</div>

  <!-- Three.js -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <!-- JOUW SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
