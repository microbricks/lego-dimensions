<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>LEGO Dimensions + Joy-Con (iPad Gamepad API)</title>
  <style>
    :root {
      --blue: #29b6f6;
      --yellow: #ffd600;
      --purple: #ab47bc;
      --bg-dark: #050814;
      --panel: #0c1020;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1a237e 0%, #000 55%);
      color: #eee;
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: linear-gradient(135deg, #0c1020, #111633);
      border-radius: 14px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.7);
      padding: 10px 12px;
      font-size: 12px;
      min-width: 230px;
    }

    #hud-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--yellow);
      text-shadow: 0 0 8px rgba(255, 214, 0, 0.7);
      margin-bottom: 4px;
    }

    .hud-btn {
      margin-top: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: radial-gradient(circle at top, #1a237e, #0c1020);
      color: #eee;
      cursor: pointer;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #joycon-status {
      margin-top: 8px;
      padding: 6px 10px;
      background: rgba(5, 8, 20, 0.9);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #joycon-icon {
      font-size: 16px;
    }

    /* Toy Pad popup */
    #pad-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(41, 182, 246, 0.18), rgba(0, 0, 0, 0.85));
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    #pad-window {
      background: linear-gradient(145deg, #050814, #101528);
      border-radius: 18px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      padding: 16px;
      width: 460px;
      max-width: 92vw;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
      color: #eee;
    }

    .figure {
      padding: 8px 12px;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      background: radial-gradient(circle at top, #1a237e, #0c1020);
      cursor: pointer;
      font-size: 12px;
      min-width: 90px;
      text-align: center;
      transition: 0.15s;
    }

    .figure.active {
      border-color: var(--yellow);
      box-shadow: 0 0 16px rgba(255, 214, 0, 0.8);
    }

    .zone {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.18);
      background: radial-gradient(circle at 30% 30%, #263238, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: 0.15s;
    }

    .zone.has-figure {
      border-color: var(--blue);
      box-shadow: 0 0 16px rgba(41, 182, 246, 0.6);
    }

    /* Debug overlay */
    #debug-box {
      position: fixed;
      bottom: 10px;
      left: 10px;
      padding: 10px;
      background: rgba(0,0,0,0.6);
      color: #0ff;
      font-size: 12px;
      z-index: 9999;
      white-space: pre;
      border: 1px solid #0ff;
      border-radius: 8px;
      max-height: 40vh;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <div id="hud">
    <div id="hud-title">LEGO Dimensions</div>
    <button id="open-pad-btn" class="hud-btn">🌀 Toy Pad</button>

    <div id="joycon-status">
      <span id="joycon-icon">🟥</span>
      <span id="joycon-text">Gamepad: geen verbonden</span>
    </div>
  </div>

  <div id="pad-overlay">
    <div id="pad-window">
      <h2>Toy Pad</h2>
      <button id="close-pad-btn">Sluiten</button>

      <div class="row" id="figures"></div>

      <div class="pad">
        <div class="zone" data-zone="left"><span>Leeg</span></div>
        <div class="zone" data-zone="middle"><span>Leeg</span></div>
        <div class="zone" data-zone="right"><span>Leeg</span></div>
      </div>

      <div id="pad-output">Nog geen figuur geplaatst.</div>
    </div>
  </div>

  <div id="debug-box">Joy-Con debug...</div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
